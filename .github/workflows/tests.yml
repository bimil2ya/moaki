name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show available iOS simulators
        run: xcrun simctl list devices available

      - name: Pick an available iPhone simulator
        id: pick_sim
        run: |
          UDID=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
              if 'iOS' not in runtime:
                  continue
              for d in devices:
                  if 'iPhone' in d['name']:
                      print(d['udid'])
                      sys.exit(0)
          ")
          if [ -z "$UDID" ]; then
            echo "No available iPhone simulator found" >&2
            exit 1
          fi
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Run MoakiKeyboardTests
        run: xcodebuild test -scheme MoakiKeyboardTests -destination "id=${{ steps.pick_sim.outputs.udid }}"
